<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>قصص الأنبياء</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1 id="title">قصص الأنبياء</h1>
    <div class="controls">
        <input type="text" id="search" placeholder="ابحث عن نبي...">
        <select id="language">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="fr">Français</option>
        </select>
        <button id="modeToggle">🌙</button>
    </div>
</header>

<main>
    <div class="prophets-list" id="prophetsList"></div>

    <div class="display-area">
        <img id="prophetImage" src="" alt="">
        <h2 id="prophetName"></h2>
        <p id="prophetStory"></p>
    </div>
</main>

<footer>
    تصميم وبرمجة: سلطان المعبدي
</footer>

<script src="script.js"></script>
</body>
</html>
